<div *ngIf="getDolarSeleccionado() as dolar"
     class="bg-[var(--bg-card)] border border-[var(--border)] rounded-lg overflow-hidden fade-in">

  <div class="flex border-b border-[var(--border)]">
    <button class="flex-1 px-3 sm:px-4 py-2.5 sm:py-3 text-xs sm:text-sm font-semibold transition-all duration-150"
            [class.text-[var(--primary)]]="mostrarCalculadoraDolarAPesos"
            [class.bg-[var(--primary-light)]]="mostrarCalculadoraDolarAPesos"
            [class.border-b-2]="mostrarCalculadoraDolarAPesos"
            [class.border-[var(--primary)]]="mostrarCalculadoraDolarAPesos"
            [class.text-[var(--text-muted)]]="!mostrarCalculadoraDolarAPesos"
            [class.hover:text-[var(--text)]]="!mostrarCalculadoraDolarAPesos"
            [class.hover:bg-[var(--bg-hover)]]="!mostrarCalculadoraDolarAPesos"
            (click)="mostrarCalculadoraDolarAPesos = true; montoInput = 0">
      USD &rarr; ARS
    </button>
    <button class="flex-1 px-3 sm:px-4 py-2.5 sm:py-3 text-xs sm:text-sm font-semibold transition-all duration-150"
            [class.text-[var(--primary)]]="!mostrarCalculadoraDolarAPesos"
            [class.bg-[var(--primary-light)]]="!mostrarCalculadoraDolarAPesos"
            [class.border-b-2]="!mostrarCalculadoraDolarAPesos"
            [class.border-[var(--primary)]]="!mostrarCalculadoraDolarAPesos"
            [class.text-[var(--text-muted)]]="mostrarCalculadoraDolarAPesos"
            [class.hover:text-[var(--text)]]="mostrarCalculadoraDolarAPesos"
            [class.hover:bg-[var(--bg-hover)]]="mostrarCalculadoraDolarAPesos"
            (click)="mostrarCalculadoraDolarAPesos = false; montoInput = 0">
      ARS &rarr; USD
    </button>
  </div>

  <div class="p-4 sm:p-5 flex flex-col gap-4">
    <div class="flex flex-col gap-1.5 relative">
      <label class="text-[11px] font-semibold uppercase tracking-wider text-[var(--text-muted)]">Tipo de dólar</label>
      <button type="button"
              (click)="toggleDropdown()"
              class="w-full flex items-center justify-between gap-2 bg-[var(--bg-input)] text-[var(--text)] border border-[var(--border)] rounded px-3 py-2.5 text-sm font-medium cursor-pointer transition-colors hover:border-[var(--primary)] focus:border-[var(--primary)] focus:outline-none">
        <span>Dólar {{ nombreTipoSeleccionado }}</span>
        <fa-icon [icon]="faChevronDown" class="text-[10px] text-[var(--text-muted)] transition-transform duration-200"
                 [class.rotate-180]="dropdownOpen"></fa-icon>
      </button>
      <div *ngIf="dropdownOpen"
           class="absolute top-full left-0 right-0 mt-1 bg-[var(--bg-input)] border border-[var(--border)] rounded-lg shadow-[var(--shadow-lg)] z-50 overflow-hidden max-h-[280px] overflow-y-auto">
        <button *ngFor="let t of tipos"
                type="button"
                (click)="seleccionarTipo(t.key)"
                class="w-full text-left px-3 py-2 text-xs font-medium cursor-pointer transition-colors"
                [class.text-[var(--primary)]]="t.key === tipoDolarSeleccionado"
                [class.bg-[var(--primary-light)]]="t.key === tipoDolarSeleccionado"
                [class.text-[var(--text)]]="t.key !== tipoDolarSeleccionado"
                [class.hover:bg-[var(--bg-hover)]]="t.key !== tipoDolarSeleccionado"
                [class.hover:text-[var(--primary)]]="t.key !== tipoDolarSeleccionado">
          Dólar {{ t.label }}
        </button>
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-[11px] font-semibold uppercase tracking-wider text-[var(--text-muted)]">Monto en {{ monedaOrigen }}</label>
      <div class="flex border rounded overflow-hidden transition-colors"
           [class.border-[var(--danger)]]="montoInput < 0"
           [class.border-[var(--border)]]="montoInput >= 0"
           [class.focus-within:border-[var(--primary)]]="montoInput >= 0">
        <span class="flex items-center px-3 bg-[var(--bg-input)] text-[var(--text-muted)] text-xs font-semibold border-r border-[var(--border)] min-w-[48px] justify-center">
          {{ monedaOrigen }}
        </span>
        <input type="number"
               class="flex-1 px-3 py-2.5 text-sm sm:text-base font-medium bg-[var(--bg-input)] text-[var(--text)] border-none outline-none tabular-nums w-0 min-w-0"
               [(ngModel)]="montoInput"
               (input)="onInputChange()"
               min="0" step="any" placeholder="0.00" />
      </div>
      <span class="text-xs text-[var(--danger)] font-medium" *ngIf="montoInput < 0">El valor no puede ser negativo</span>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-[11px] font-semibold uppercase tracking-wider text-[var(--text-muted)]">Resultado en {{ monedaDestino }}</label>
      <div class="flex border rounded overflow-hidden transition-all duration-150"
           [class.border-[var(--primary)]]="montoInput > 0 && montoValido"
           [class.bg-[var(--primary-light)]]="montoInput > 0 && montoValido"
           [class.border-[var(--border)]]="!(montoInput > 0 && montoValido)">
        <span class="flex items-center px-3 bg-[var(--bg-input)] text-[var(--text-muted)] text-xs font-semibold border-r border-[var(--border)] min-w-[48px] justify-center">
          {{ monedaDestino }}
        </span>
        <span class="flex-1 px-3 py-2.5 text-base sm:text-lg font-bold text-[var(--text)] tabular-nums">{{ resultadoFormateado }}</span>
        <button class="flex items-center px-3 border-l border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--primary)] hover:bg-[var(--bg-hover)] transition-all duration-150 bg-transparent cursor-pointer"
                (click)="copiarResultado()"
                [attr.aria-label]="'Copiar resultado'">
          <fa-icon [icon]="copied ? faCheck : faCopy" [class.text-[var(--success)]]="copied" class="text-sm"></fa-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="border-t border-[var(--border)] px-4 sm:px-5 py-3">
    <div class="flex flex-col gap-1.5">
      <span class="text-[11px] font-semibold uppercase tracking-wider text-[var(--text-muted)]">Cotización {{ getTituloCalculadora() }}</span>
      <div class="flex items-center gap-2 text-xs sm:text-sm text-[var(--text-secondary)] flex-wrap">
        <span>Compra: <strong class="text-[var(--text)] font-bold">{{ dolar.compra | currency:'ARS':'symbol-narrow':'1.2-2' }}</strong></span>
        <span class="text-[var(--border)]">|</span>
        <span>Venta: <strong class="text-[var(--text)] font-bold">{{ dolar.venta | currency:'ARS':'symbol-narrow':'1.2-2' }}</strong></span>
      </div>
    </div>
  </div>
</div>
