<div class="bg-[var(--bg-card)] border rounded-lg p-4 cursor-pointer transition-all duration-150 flex flex-col gap-2.5 fade-in"
     [class.border-[var(--primary)]]="isSelected"
     [class.bg-[var(--primary-light)]]="isSelected"
     [class.border-[var(--border)]]="!isSelected"
     [class.hover:border-[var(--primary)]]="!isSelected"
     [class.hover:bg-[var(--bg-hover)]]="!isSelected"
     [class.opacity-50]="isLoading"
     [class.pointer-events-none]="isLoading"
     (click)="onSelect()"
     role="button"
     tabindex="0"
     (keydown.enter)="onSelect()"
     (keydown.space)="onSelect(); $event.preventDefault()"
     [attr.aria-selected]="isSelected"
     [attr.aria-label]="nombre + ': compra ' + (compra || 0) + ', venta ' + (venta || 0)">

  <div class="flex items-center justify-between gap-2">
    <span class="text-sm sm:text-base font-semibold text-[var(--text)]">{{ nombre }}</span>
    <div class="flex items-center gap-2">
      <span *ngIf="variacion"
            class="inline-flex items-center gap-0.5 text-[11px] font-semibold px-1.5 py-0.5 rounded"
            [class.text-[var(--success)]]="variacion.tipo === 'subio'"
            [class.bg-[var(--success-light)]]="variacion.tipo === 'subio'"
            [class.text-[var(--danger)]]="variacion.tipo === 'bajo'"
            [class.bg-[var(--danger-light)]]="variacion.tipo === 'bajo'"
            [class.text-[var(--text-muted)]]="variacion.tipo === 'estable'"
            [class.bg-[var(--bg-input)]]="variacion.tipo === 'estable'">
        <span *ngIf="variacion.tipo === 'subio'">&#9650;</span>
        <span *ngIf="variacion.tipo === 'bajo'">&#9660;</span>
        <span *ngIf="variacion.tipo === 'estable'">&#9679;</span>
        {{ variacion.porcentaje }}%
      </span>
      <button class="bg-transparent border-none cursor-pointer p-0.5 flex items-center transition-all duration-150"
              [class.text-[var(--warning)]]="isFavorite"
              [class.text-[var(--text-muted)]]="!isFavorite"
              [class.hover:text-[var(--warning)]]="!isFavorite"
              [class.hover:scale-110]="!isFavorite"
              (click)="onToggleFavorite($event)"
              [attr.aria-label]="isFavorite ? 'Quitar de favoritos' : 'Agregar a favoritos'"
              tabindex="-1">
        <fa-icon [icon]="isFavorite ? faStarSolid : faStarRegular" class="text-sm"></fa-icon>
      </button>
    </div>
  </div>

  <div *ngIf="!isLoading; else skeletonPrices" class="flex items-center justify-between gap-3">
    <div class="flex flex-col gap-0.5">
      <span class="text-[11px] font-medium uppercase tracking-wider text-[var(--text-muted)]">Compra</span>
      <span class="text-base sm:text-lg font-bold text-[var(--text)] tabular-nums">{{ compra | currency:'ARS':'symbol-narrow':'1.2-2' }}</span>
    </div>
    <div class="w-px h-8 bg-[var(--border)] flex-shrink-0"></div>
    <div class="flex flex-col gap-0.5 items-end">
      <span class="text-[11px] font-medium uppercase tracking-wider text-[var(--text-muted)]">Venta</span>
      <span class="text-base sm:text-lg font-bold text-[var(--text)] tabular-nums">{{ venta | currency:'ARS':'symbol-narrow':'1.2-2' }}</span>
    </div>
  </div>

  <ng-template #skeletonPrices>
    <div class="flex items-center justify-between gap-3">
      <div class="flex flex-col gap-1.5">
        <span class="text-[11px] uppercase tracking-wider text-[var(--text-muted)]">Compra</span>
        <div class="shimmer rounded h-5 w-20"></div>
      </div>
      <div class="w-px h-8 bg-[var(--border)]"></div>
      <div class="flex flex-col gap-1.5 items-end">
        <span class="text-[11px] uppercase tracking-wider text-[var(--text-muted)]">Venta</span>
        <div class="shimmer rounded h-5 w-20"></div>
      </div>
    </div>
  </ng-template>
</div>
