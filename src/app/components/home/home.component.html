<h1 class="text-center text-xl sm:text-2xl font-bold text-[var(--text)] mb-6">
  Convierte y Consulta el Tipo de Cambio del Dólar
</h1>

<div class="flex items-center justify-center gap-2 mb-4 text-xs sm:text-sm text-[var(--text-muted)]"
     *ngIf="!isLoading && !hasError && ultimaActualizacion">
  <fa-icon [icon]="faClock" class="text-[10px]"></fa-icon>
  <span>Última actualización: {{ ultimaActualizacion | date:'HH:mm' }}</span>
  <button (click)="refresh()"
          class="px-2 py-1 text-xs border border-[var(--border)] rounded text-[var(--text-muted)] hover:text-[var(--primary)] hover:border-[var(--primary)] transition-colors bg-transparent cursor-pointer">
    <fa-icon [icon]="faRefresh" [class.animate-spin]="isLoading"></fa-icon>
  </button>
</div>

<div class="flex items-center gap-3 p-3 mb-4 bg-[var(--danger-light)] border border-[var(--danger)] rounded-lg text-[var(--danger)] text-sm font-medium"
     *ngIf="hasError">
  <fa-icon [icon]="faExclamationTriangle" class="flex-shrink-0"></fa-icon>
  <span class="flex-1 text-center">{{ errorMessage }}</span>
  <button (click)="refresh()"
          class="bg-[var(--danger)] text-white px-3 py-1.5 rounded text-xs font-semibold border-none cursor-pointer hover:opacity-90 transition-opacity flex-shrink-0">
    Reintentar
  </button>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
  <div class="order-1 lg:order-2 flex flex-col gap-4 sm:gap-6">
    <app-calculator
      [tipoDolarSeleccionado]="tipoDolarSeleccionado"
      [dolarOficial]="getDolarSeleccionado('oficial')"
      [dolarBlue]="getDolarSeleccionado('blue')"
      [dolarBolsa]="getDolarSeleccionado('bolsa')"
      [dolarCCL]="getDolarSeleccionado('ccl')"
      [dolarTarjeta]="getDolarSeleccionado('tarjeta')"
      [dolarMayorista]="getDolarSeleccionado('mayorista')"
      [dolarCripto]="getDolarSeleccionado('cripto')">
    </app-calculator>

    <app-chart
      *ngIf="!isLoading && historialEntries.length > 1"
      [entries]="historialEntries"
      [tipoNombre]="nombreSeleccionado">
    </app-chart>
  </div>

  <div class="order-2 lg:order-1">
    <div *ngIf="isLoading && !hasError" class="flex flex-col gap-2">
      <div *ngFor="let _ of [].constructor(7)" class="shimmer rounded-lg h-[74px]"></div>
    </div>

    <div class="flex flex-col gap-2" *ngIf="!isLoading || hasError">
      <app-cotizacion-card
        *ngFor="let item of cotizacionesOrdenadas"
        [tipo]="item.tipo"
        [nombre]="item.nombre"
        [compra]="item.data?.compra ?? null"
        [venta]="item.data?.venta ?? null"
        [variacion]="item.variacion"
        [isSelected]="tipoDolarSeleccionado === item.tipo"
        [isFavorite]="favoritos.includes(item.tipo)"
        [isLoading]="isLoading"
        (select)="seleccionarTipoDolar($event)"
        (toggleFavorite)="toggleFavorito($event)">
      </app-cotizacion-card>
    </div>
  </div>
</div>
