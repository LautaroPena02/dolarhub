<footer class="w-full border-t border-[var(--border)] bg-[var(--bg-surface)]">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-center gap-6 py-6">
      <a [href]="githubUrl" target="_blank" rel="noopener noreferrer"
         class="text-[var(--text-muted)] hover:text-[var(--primary)] transition-colors"
         aria-label="GitHub">
        <fa-icon [icon]="faGithub" size="lg"></fa-icon>
      </a>
      <a [href]="linkedinUrl" target="_blank" rel="noopener noreferrer"
         class="text-[var(--text-muted)] hover:text-[var(--primary)] transition-colors"
         aria-label="LinkedIn">
        <fa-icon [icon]="faLinkedin" size="lg"></fa-icon>
      </a>
    </div>
  </div>
</footer>
