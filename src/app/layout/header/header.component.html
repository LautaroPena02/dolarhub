<header class="w-full border-b border-[var(--border)] bg-[var(--bg-surface)]">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="/" class="text-xl font-bold text-[var(--text)] hover:text-[var(--primary)] transition-colors no-underline">
        Dólar Hub
      </a>
      <button (click)="themeService.toggleTheme()"
              class="p-2 rounded-lg text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-[var(--bg-hover)] transition-colors"
              [attr.aria-label]="'Cambiar tema'">
        <fa-icon [icon]="isDarkMode ? faSun : faMoon" size="lg"></fa-icon>
      </button>
    </div>
  </div>
</header>
